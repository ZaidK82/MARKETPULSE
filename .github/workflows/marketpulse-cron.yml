name: MarketPulse Cron

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-marketpulse-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger MarketPulse scheduler
        run: |
          curl -X POST "${{ secrets.MARKETPULSE_BACKEND_URL }}/api/v1/scheduler/run-once" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail